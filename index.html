<!DOCTYPE html>
<html>
<head>
    <title>AI Face Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 20px; }
        /* Make the video shrink to fit phone screens */
        video { border: 2px solid #ccc; border-radius: 8px; max-width: 90%; height: auto; }
        button { padding: 15px 30px; font-size: 18px; margin-top: 20px; cursor: pointer; border-radius: 8px; background-color: #007bff; color: white; border: none;}
        #message { margin-top: 20px; font-weight: bold; font-size: 18px; padding: 10px;}
    </style>
</head>
<body>

    <h2>Secure Face Login</h2>
    
    <video id="webcam" width="400" height="300" autoplay playsinline></video>
    <br>
    <button onclick="attemptLogin()">Log In with Face</button>

    <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
    
    <div id="message"></div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const messageDiv = document.getElementById('message');

        // 2. We request the front "user" camera specifically for mobile
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } 
        })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { console.error("Webcam access denied", err); });

        async function attemptLogin() {
            messageDiv.innerText = "Analyzing face...";
            messageDiv.style.color = "black";
            
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');

            try {
                // IMPORTANT: Keep your actual Hugging Face URL here!
                const response = await fetch('https://huggingface.co/spaces/Dipanshun/face-login-api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    messageDiv.style.color = "green";
                    messageDiv.innerText = "✅ " + result.message;
                } else {
                    messageDiv.style.color = "red";
                    messageDiv.innerText = "❌ " + result.message;
                }
                
            } catch (error) {
                messageDiv.innerText = "Error connecting to server.";
            }
        }
    </script>
</body>
</html>
